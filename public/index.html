<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="./assets/img/brand/logoPNG.png" width="100%" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Web site created using create-react-app" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.svg" />
  <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
  <title>DMT::DON MUANG TOLLWAY PUBLIC Co.,LTD,</title>

  <script src="%PUBLIC_URL%/assets/config/api.js"></script>

  <!--
    Pre-paint theme bootstrap (v1.5.0).
    Sets <html data-theme="..."> from localStorage or OS preference BEFORE
    React mounts to prevent a flash of incorrect theme. Keep in sync with
    src/theme/themeBootstrap.js.
  -->
  <script>
    (function () {
      try {
        var KEY = 'dmt-scw-theme';
        var stored = null;
        try { stored = window.localStorage.getItem(KEY); } catch (e) {}
        var mode = (stored === 'light' || stored === 'dark' || stored === 'system')
          ? stored
          : 'system';
        var resolved = mode;
        if (mode === 'system') {
          resolved = (window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches)
            ? 'dark'
            : 'light';
        }
        document.documentElement.setAttribute('data-theme', resolved);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
</head>

<body>

  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>

</html>
